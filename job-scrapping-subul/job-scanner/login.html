<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JobScan — Login</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0d0f17;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }

  .card {
    background: #131620;
    border: 1px solid #1e2235;
    border-radius: 20px;
    padding: 52px 44px;
    width: 100%;
    max-width: 440px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.6);
  }

  .logo {
    text-align: center;
    margin-bottom: 40px;
  }
  .logo-icon { font-size: 52px; margin-bottom: 14px; display: block; }
  .logo h1 {
    font-size: 30px;
    font-weight: 700;
    color: #e8ecf8;
    letter-spacing: -0.5px;
  }
  .logo p { font-size: 13px; color: #5a607a; margin-top: 8px; }

  label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    color: #5a607a;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 10px;
  }

  .input-wrap {
    position: relative;
  }
  .input-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 18px;
    pointer-events: none;
  }
  input[type="number"] {
    width: 100%;
    background: #0d0f17;
    border: 1.5px solid #1e2235;
    border-radius: 12px;
    padding: 16px 16px 16px 48px;
    font-size: 22px;
    font-weight: 700;
    color: #e8ecf8;
    letter-spacing: 6px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -moz-appearance: textfield;
  }
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
  input[type="number"]:focus {
    border-color: #4f6ef7;
    box-shadow: 0 0 0 3px rgba(79,110,247,0.15);
  }
  input[type="number"]::placeholder {
    color: #2a2f45;
    letter-spacing: 2px;
    font-weight: 400;
    font-size: 16px;
  }

  .hint {
    font-size: 11px;
    color: #3a4060;
    text-align: center;
    margin-top: 10px;
  }

  .btn-primary {
    margin-top: 28px;
    width: 100%;
    background: linear-gradient(135deg, #4f6ef7 0%, #7c4fff 100%);
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-size: 15px;
    font-weight: 700;
    color: white;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: opacity 0.2s, transform 0.15s;
    box-shadow: 0 8px 24px rgba(79,110,247,0.35);
  }
  .btn-primary:hover { opacity: 0.92; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  .error-msg {
    margin-top: 14px;
    font-size: 12px;
    color: #ef4444;
    text-align: center;
    min-height: 16px;
    transition: opacity 0.2s;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 24px 0;
    color: #2a2f45;
    font-size: 11px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #1e2235;
  }

  .footer {
    margin-top: 36px;
    text-align: center;
    font-size: 11px;
    color: #2a2f45;
    line-height: 1.8;
  }
  .footer a { color: #3a4060; text-decoration: none; }
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <span class="logo-icon">🔍</span>
    <h1>JobScan</h1>
    <p>AI-powered job matching · Azure OpenAI + MiniLM</p>
  </div>

  <label for="uid">Your User ID</label>
  <div class="input-wrap">
    <span class="input-icon">👤</span>
    <input
      type="number"
      id="uid"
      placeholder="e.g.  1001"
      min="1"
      autofocus
    />
  </div>
  <div class="hint">Enter your numeric ID to access your job profile</div>

  <button class="btn-primary" onclick="proceed()">
    Continue &nbsp;→
  </button>

  <div class="error-msg" id="err"></div>

  <div class="divider">or</div>

  <div style="text-align:center;font-size:12px;color:#5a607a">
    New user? Just enter any unused ID to create a profile.
  </div>

  <div class="footer">
    JobScan v2 · Powered by Azure OpenAI + Fine-tuned MiniLM<br>
    <a href="#">Privacy</a> · <a href="#">Terms</a>
  </div>
</div>

<script>
  function proceed() {
    const val = parseInt(document.getElementById('uid').value, 10);
    const err = document.getElementById('err');

    if (!val || val < 1) {
      err.textContent = '⚠ Please enter a valid numeric ID (minimum 1)';
      document.getElementById('uid').focus();
      return;
    }

    err.textContent = '';

    // Stocker user_id dans sessionStorage pour le récupérer dans index.html
    sessionStorage.setItem('jobscan_user_id', val);

    // Aller vers /cv (ta page existante index.html servie sur /cv)
    window.location.href = `/cv?user_id=${val}`;
  }

  document.getElementById('uid').addEventListener('keydown', e => {
    if (e.key === 'Enter') proceed();
  });

  // Si déjà un user_id en session → pré-remplir
  const saved = sessionStorage.getItem('jobscan_user_id');
  if (saved) document.getElementById('uid').value = saved;
</script>

</body>
</html>
