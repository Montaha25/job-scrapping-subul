<!--
  PATCH JobScan v2 — user_id + PostgreSQL cache
  
  À coller JUSTE AVANT </body> dans ton index.html existant.
  Ce script :
    1. Lit user_id depuis l'URL (?user_id=1001)
    2. Vérifie si ce user a des jobs en cache (GET /jobs/{user_id})
    3. Si oui → affiche les jobs directement sans rescan
    4. Modifie le POST /scan pour envoyer user_id
    5. Affiche un badge "User #1001" dans le header
-->
<script>
(function() {
  // ── 1. Lire user_id depuis l'URL ──────────────────────────────────────────
  const params = new URLSearchParams(window.location.search);
  const userId = parseInt(params.get('user_id') || sessionStorage.getItem('jobscan_user_id') || '0', 10);

  if (!userId) {
    // Pas de user_id → rediriger vers la page login
    window.location.href = '/';
    return;
  }

  // Sauvegarder en session
  sessionStorage.setItem('jobscan_user_id', userId);

  // ── 2. Afficher badge user dans le header ─────────────────────────────────
  function injectUserBadge() {
    // Chercher le header ou le premier div de la page
    const targets = [
      document.querySelector('header'),
      document.querySelector('.header'),
      document.querySelector('nav'),
      document.querySelector('.navbar'),
      document.querySelector('.top-bar'),
      document.body,
    ];
    const target = targets.find(el => el !== null);

    const badge = document.createElement('div');
    badge.id = 'user-badge';
    badge.style.cssText = `
      position: fixed;
      top: 12px;
      right: 16px;
      z-index: 9999;
      display: flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #4f6ef7, #7c4fff);
      border-radius: 20px;
      padding: 6px 14px 6px 10px;
      font-size: 12px;
      font-weight: 600;
      color: white;
      box-shadow: 0 4px 16px rgba(79,110,247,0.4);
      cursor: default;
      user-select: none;
    `;
    badge.innerHTML = `
      <span>👤</span>
      <span>User #${userId}</span>
      <a href="/" style="
        margin-left:8px;
        font-size:10px;
        color:rgba(255,255,255,0.7);
        text-decoration:none;
        border-left:1px solid rgba(255,255,255,0.3);
        padding-left:8px;
      " title="Change user">✕</a>
    `;
    document.body.appendChild(badge);
  }

  // ── 3. Patch POST /scan pour inclure user_id ──────────────────────────────
  // On intercepte le fetch original de ton index.html
  const _originalFetch = window.fetch.bind(window);
  window.fetch = function(url, options) {
    if (typeof url === 'string' && url.includes('/scan') && options && options.method === 'POST') {
      try {
        const body = JSON.parse(options.body);
        body.user_id = userId;
        options.body = JSON.stringify(body);
      } catch(e) {
        // Si parsing échoue → laisser passer tel quel
      }
    }
    return _originalFetch(url, options);
  };

  // ── 4. Vérifier cache DB au chargement ───────────────────────────────────
  async function checkCache() {
    try {
      const banner = document.createElement('div');
      banner.id = 'cache-banner';
      banner.style.cssText = `
        position: fixed;
        top: 0; left: 0; right: 0;
        z-index: 9998;
        background: linear-gradient(90deg, #4f6ef7, #7c4fff);
        color: white;
        text-align: center;
        padding: 12px;
        font-size: 13px;
        font-weight: 500;
        box-shadow: 0 2px 16px rgba(0,0,0,0.3);
        transition: transform 0.3s;
        display: none;
      `;
      banner.innerHTML = `
        ✨ Loading your saved jobs...
        <button onclick="document.getElementById('cache-banner').style.display='none'"
          style="margin-left:16px;background:rgba(255,255,255,0.2);border:none;
                 border-radius:4px;color:white;padding:2px 10px;cursor:pointer;font-size:12px">
          ✕
        </button>
      `;
      document.body.appendChild(banner);

      const response = await _originalFetch(`/jobs/${userId}`);
      const reader   = response.body.getReader();
      const decoder  = new TextDecoder();
      let   buffer   = '';
      let   jobsLoaded = 0;
      let   hasCached  = false;

      function pump() {
        return reader.read().then(({ done, value }) => {
          if (done) return;
          buffer += decoder.decode(value, { stream: true });
          const parts = buffer.split('\n\n');
          buffer = parts.pop();

          parts.forEach(part => {
            if (!part.startsWith('data: ')) return;
            try {
              const data = JSON.parse(part.slice(6));

              if (data.event === 'no_cache') {
                // Aucun job en cache → ne rien faire, laisser l'utilisateur scanner
                banner.style.display = 'none';
                return;
              }

              if (data.event === 'cached') {
                hasCached = true;
                banner.style.display = 'block';
                banner.innerHTML = `
                  ✨ <strong>${data.total} saved jobs</strong> loaded from your profile.
                  <span style="opacity:0.8;margin-left:8px;font-size:12px">Scan again to refresh</span>
                  <button onclick="document.getElementById('cache-banner').style.display='none'"
                    style="margin-left:16px;background:rgba(255,255,255,0.2);border:none;
                           border-radius:4px;color:white;padding:2px 10px;cursor:pointer;font-size:12px">
                    ✕
                  </button>
                `;
              }

              if (data.event === 'job' && hasCached) {
                jobsLoaded++;
                // Appeler la fonction de rendu existante de ton index.html
                // Elle s'appelle différemment selon ton code → on cherche les noms communs
                const renderFn = window.addJobCard
                               || window.renderJob
                               || window.pushJob
                               || window.displayJob
                               || window.addJob;
                if (typeof renderFn === 'function') {
                  renderFn(data);
                } else {
                  // Fallback : dispatcher un event custom que ton code peut écouter
                  window.dispatchEvent(new CustomEvent('jobscan:job', { detail: data }));
                }
              }

              if (data.event === 'done' && hasCached) {
                window.dispatchEvent(new CustomEvent('jobscan:done', { detail: { total: jobsLoaded } }));
              }

            } catch(e) {}
          });

          return pump();
        });
      }

      await pump();

    } catch(e) {
      console.warn('[JobScan cache] Error:', e);
    }
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => {
      injectUserBadge();
      checkCache();
    });
  } else {
    injectUserBadge();
    checkCache();
  }

})();
</script>
